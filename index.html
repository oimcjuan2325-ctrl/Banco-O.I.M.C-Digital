<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Banco Central O.I.M.C.</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        h1 { color: #1B365D; }
        input { width: 80%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #1B365D; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="loginSection" class="card">
    <h1>Acceso O.I.M.C.</h1>
    <input type="password" id="pinInput" placeholder="Introduce tu PIN" maxlength="4">
    <button onclick="iniciarSesion()">Acceder</button>
</div>

<div id="appSection" class="card hidden">
    <h2 id="userName"></h2>
    <p>Saldo: <strong id="userSaldo"></strong> Oincalias</p>
    <hr>
    <input type="number" id="cantidad" placeholder="Cantidad">
    <input type="text" id="destinatario" placeholder="Nombre destinatario">
    <button onclick="realizarTransferencia()">Transferir</button>
    <p id="msg"></p>
</div>

<script>
    // CENSO OFICIAL O.I.M.C. - ACTUALIZADO SEGÚN REGISTRO GUBERNAMENTAL
    const baseDatosInicial = {
        "2313": { nombre: "Juan", saldo: 10 },
        "2021": { nombre: "Asier", saldo: 10 },
        "1365": { nombre: "Jesús", saldo: 10 },
        "1460": { nombre: "Yolanda", saldo: 10 },
        "2013": { nombre: "Mikel", saldo: 10 },
        "9837": { nombre: "Gaizka", saldo: 10 },
        "7467": { nombre: "Iñaki", saldo: 10 },
        "7562": { nombre: "Erika", saldo: 0 },
        "9786": { nombre: "Nahia", saldo: 0 },
        "1053": { nombre: "Amets", saldo: 0 },
        "2325": { nombre: "BANCO-OIMC", saldo: 100 }
    };

    let usuarios = JSON.parse(localStorage.getItem('bancoOIMC')) || baseDatosInicial;
    let usuarioActual = null;

    function iniciarSesion() {
        const pin = document.getElementById('pinInput').value;
        if (usuarios[pin]) {
            usuarioActual = pin;
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('appSection').classList.remove('hidden');
            actualizarUI();
        } else { alert("PIN denegado por el Banco."); }
    }

    function actualizarUI() {
        document.getElementById('userName').innerText = "Gobernanza: " + usuarios[usuarioActual].nombre;
        document.getElementById('userSaldo').innerText = usuarios[usuarioActual].saldo;
        localStorage.setItem('bancoOIMC', JSON.stringify(usuarios));
    }

    function realizarTransferencia() {
        const cantidad = parseInt(document.getElementById('cantidad').value);
        const destNombre = document.getElementById('destinatario').value;

        if (isNaN(cantidad) || cantidad <= 0) { document.getElementById('msg').innerText = "Cantidad no válida."; return; }
        if (cantidad > usuarios[usuarioActual].saldo) { document.getElementById('msg').innerText = "Saldo insuficiente."; return; }

        let destPIN = Object.keys(usuarios).find(pin => usuarios[pin].nombre === destNombre);
        
        if (destPIN) {
            usuarios[usuarioActual].saldo -= cantidad;
            usuarios[destPIN].saldo += cantidad;
            actualizarUI();
            document.getElementById('msg').innerText = "Transacción validada.";
        } else {
            document.getElementById('msg').innerText = "Destinatario no reconocido.";
        }
    }
</script>
</body>
</html>
